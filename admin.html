<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Admin | CONAD</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/site.css" />
  <style>
    .admin-top { padding: 28px 0; }
    .form-row { display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
    .form-label { font-size: 13px; color: var(--color-muted); }
    .input { width: 100%; padding: 12px 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.04); color: var(--color-text); }
    .form-grid { display:grid; grid-template-columns: 1fr; gap: 10px; }
    @media (min-width: 980px) { .form-grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <header class="site-header is-scrolled">
    <div class="container header-inner">
      <a class="brand" href="index.html" aria-label="Voltar ao site">
        <span class="brand-mark">CONAD</span><span class="brand-year">Admin</span>
      </a>
      <div class="header-actions">
        <button class="btn btn-ghost" id="logout" type="button">Sair</button>
      </div>
    </div>
  </header>

  <main id="conteudo">
    <section class="admin-top">
      <div class="container">
        <h1 style="margin:0 0 8px 0">Painel Admin</h1>
        <p id="status" style="margin:0;color:var(--color-muted)">Carregando…</p>
      </div>
    </section>

    <section class="section" id="loginFormWrap">
      <div class="container">
        <div class="card" style="padding:16px">
          <h2 class="section-title" style="margin-top:0">Login</h2>
          <form id="loginForm">
            <label class="form-row">
              <span class="form-label">Email</span>
              <input class="input" id="email" type="email" autocomplete="email" required />
            </label>
            <label class="form-row">
              <span class="form-label">Senha</span>
              <input class="input" id="password" type="password" autocomplete="current-password" required />
            </label>
            <button class="btn btn-primary" type="submit">Entrar</button>
          </form>
        </div>
      </div>
    </section>

    <div id="editor" style="display:none">
      <div id="fields"></div>
      <section class="section">
        <div class="container" style="display:flex; gap:12px; flex-wrap:wrap">
          <button class="btn btn-primary" id="save" type="button">Salvar alterações</button>
          <a class="btn btn-ghost" href="index.html">Ver site</a>
        </div>
      </section>
    </div>
  </main>

  <script src="js/cms-config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
